<div id="app">
  <h1>{{ title }}</h1>
  <p>{{ desc }}</p>
  <div class="counter">
    <button @click="count--">-</button>
    <span>{{ count }}</span>
    <button @click="count++">+</button>
  </div>
  <div class="input-group">
    <input v-model="name" placeholder="输入你的名字" />
    <p v-if="name">你好，{{ name }}！</p>
  </div>
</div>

<style>
  #app {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
    color: #333;
  }
  h1 {
    color: #409eff;
    font-size: 22px;
    margin-bottom: 8px;
  }
  p { color: #666; margin-bottom: 16px; }
  .counter {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .counter button {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 8px;
    background: #409eff;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .counter button:hover { background: #66b1ff; }
  .counter span {
    font-size: 24px;
    font-weight: 700;
    min-width: 40px;
    text-align: center;
  }
  .input-group input {
    padding: 8px 14px;
    border: 2px solid #dcdfe6;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: #409eff; }
  .input-group p { margin-top: 8px; color: #67c23a; }
</style>

<script>
  // 优先加载本地 vue.global.js，失败时回退到 CDN
  (function loadVue(onReady) {
    var s = document.createElement('script')
    s.src = '/vendor/vue.global.js'
    s.onload = function () {
      if (window.Vue) { onReady(); return }
      tryFallback(onReady)
    }
    s.onerror = function () { tryFallback(onReady) }
    document.head.appendChild(s)

    function tryFallback(cb) {
      var f = document.createElement('script')
      f.src = 'https://unpkg.com/vue@3.5.38/dist/vue.global.js'
      f.onload = function () { cb() }
      f.onerror = function () {
        document.getElementById('app').innerHTML = '<div style="padding:24px;color:#f56c6c;">Vue 加载失败，请检查网络连接</div>'
      }
      document.head.appendChild(f)
    }
  })(function () {
    initApp()
  })

  function initApp() {
    var createApp = Vue.createApp
    var ref = Vue.ref
    createApp({
      setup: function () {
        var title = ref('Hello Plugin!')
        var desc = ref('这是一个使用 Vue 3 编写的插件示例')
        var count = ref(0)
        var name = ref('')
        return { title: title, desc: desc, count: count, name: name }
      }
    }).mount('#app')
  }
</script>
