# ============================================================
#   Tools Manager 生产环境 Docker Compose
#   使用 GitHub Container Registry 预构建镜像
#   部署目录: /opt/tools-manager/
#
#   镜像加速（国内服务器）：
#     通过环境变量 IMAGE 指定加速镜像地址，例如：
#     IMAGE=ghcr.nju.edu.cn/secoworld/tools-manager:latest docker compose -f docker-compose.prod.yml up -d
# ============================================================

version: '3.8'

services:
  tools-manager:
    # 使用 GHCR 预构建镜像（无需本地构建）
    # 支持通过环境变量 IMAGE 覆盖，便于国内服务器使用镜像加速
    image: ${IMAGE:-ghcr.io/secoworld/tools-manager:latest}
    container_name: tools-manager
    ports:
      - "8085:8085"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/tools"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 数据持久化（命令库数据）
    volumes:
      - tools-manager-data:/app/data

volumes:
  tools-manager-data:
