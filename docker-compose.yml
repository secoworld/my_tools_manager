version: '3.8'

services:
  tools-manager:
    build: .
    image: tools-manager:latest
    container_name: tools-manager
    ports:
      - "8085:8085"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/tools"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
