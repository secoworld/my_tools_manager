# ============================================================
#   Release Workflow - 打 tag 时自动构建 Docker 镜像并发布 Release
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.1)'
        required: true
        default: 'v0.0.1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 确定 Tag 名称
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release Tag: $TAG"

      - name: 设置 up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.tag.outputs.tag }}
          load: false

      - name: 保存 Docker 镜像为 tar
        run: |
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.tag.outputs.tag }}
          docker save ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.tag.outputs.tag }} -o tools-manager-${{ steps.tag.outputs.tag }}-docker.tar
          gzip tools-manager-${{ steps.tag.outputs.tag }}-docker.tar
          ls -lh tools-manager-*.tar.gz

      - name: 创建源码压缩包
        run: |
          git archive --format=zip -o tools-manager-${{ steps.tag.outputs.tag }}-src.zip ${{ steps.tag.outputs.tag }}
          ls -lh tools-manager-*.zip

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            ## Tools Manager ${{ steps.tag.outputs.tag }}

            ### 下载说明
            - **Docker 镜像**: `tools-manager-${{ steps.tag.outputs.tag }}-docker.tar.gz`
              ```bash
              # 加载镜像
              docker load -i tools-manager-${{ steps.tag.outputs.tag }}-docker.tar.gz
              # 运行容器
              docker run -d -p 8085:8085 -v tools-manager-data:/app/data -v tools-manager-plugins:/app/plugins ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
              ```
            - **源码**: `tools-manager-${{ steps.tag.outputs.tag }}-src.zip`
            - **Docker Pull**: `docker pull ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}`

            ### 功能
            - 工具箱管理（计算器、JSON格式化、时间戳转换等）
            - 后台管理界面（登录/修改密码/插件管理）
            - 自定义插件上传/动态加载/显示范围控制
            - 插件开发工具（实时预览/下载/上传）
            - SQLite数据库 + Spring Security认证
            - Docker容器化部署
          files: |
            tools-manager-${{ steps.tag.outputs.tag }}-docker.tar.gz
            tools-manager-${{ steps.tag.outputs.tag }}-src.zip
          draft: false
          prerelease: false
