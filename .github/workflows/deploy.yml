# ============================================================
#   Tools Manager CI/CD Workflow
#   推送到 main 分支时自动构建镜像 → 推送到 GHCR → SSH 部署到服务器
# ============================================================

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---- 任务 1: 构建并推送 Docker 镜像 ----
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像元数据（小写）
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${OWNER}/tools-manager"
          echo "tags=${IMAGE}:latest,${IMAGE}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "镜像地址: ${IMAGE}"

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

      - name: 构建结果
        run: |
          echo "✅ 镜像构建并推送完成"
          echo "镜像: ${{ steps.meta.outputs.image }}:latest"

  # ---- 任务 2: SSH 部署到服务器 ----
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.SERVER_HOST != '' }}
    continue-on-error: false

    steps:
      - name: 打印部署信息
        run: |
          echo "服务器: ${{ vars.SERVER_HOST }}:${{ vars.SERVER_PORT || 22 }}"
          echo "用户: ${{ vars.SERVER_USER }}"
          echo "镜像: ${{ needs.build-and-push.outputs.image }}"

      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ vars.GHCR_USER }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ vars.SERVER_PORT || 22 }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            set -x  # 显示每条执行的命令，便于调试

            echo "===== 开始部署 Tools Manager ====="
            date

            # ---- 检查 Docker ----
            if ! command -v docker &> /dev/null; then
              echo "❌ Docker 未安装"
              exit 1
            fi
            echo "✅ Docker 版本: $(docker --version)"

            # ---- 确定 docker compose 命令 ----
            if docker compose version &> /dev/null; then
              DC="docker compose"
            elif command -v docker-compose &> /dev/null; then
              DC="docker-compose"
            else
              echo "❌ Docker Compose 未安装"
              exit 1
            fi
            echo "✅ Compose 命令: $DC"

            # ---- 部署目录 ----
            DEPLOY_DIR="/opt/tools-manager"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # ---- 下载最新的 docker-compose.prod.yml ----
            echo "下载 docker-compose.prod.yml..."
            curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml" \
              -o docker-compose.prod.yml || {
              echo "❌ 下载 docker-compose.prod.yml 失败"
              exit 1
            }
            echo "✅ 配置文件已更新"

            # ---- 登录 GHCR（可选，公开镜像可跳过）----
            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "登录 GHCR..."
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin || {
                echo "⚠️ GHCR 登录失败，尝试匿名拉取（仅公开镜像可用）"
              }
            else
              echo "ℹ️ 未配置 GHCR_TOKEN，尝试匿名拉取（仅公开镜像可用）"
            fi

            # ---- 拉取最新镜像 ----
            echo "拉取最新镜像..."
            $DC -f docker-compose.prod.yml pull || {
              echo "❌ 镜像拉取失败"
              echo "请检查："
              echo "  1. 镜像是否为公开（GitHub → Packages → tools-manager → Package settings → Public）"
              echo "  2. 或配置 GHCR_TOKEN 和 GHCR_USER 变量"
              exit 1
            }

            # ---- 重启容器 ----
            echo "重启容器..."
            $DC -f docker-compose.prod.yml up -d --force-recreate

            # ---- 等待启动 ----
            echo "等待容器启动..."
            sleep 5

            # ---- 清理旧镜像 ----
            echo "清理旧镜像..."
            docker image prune -f || true

            # ---- 检查状态 ----
            echo "===== 容器状态 ====="
            $DC -f docker-compose.prod.yml ps

            echo "===== 部署完成 ====="
            echo "访问地址: http://$(hostname -I | awk '{print $1}'):8080"

      - name: 部署结果
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ 部署成功！"
          else
            echo "❌ 部署失败"
            echo ""
            echo "排查步骤："
            echo "1. 检查 GitHub Variables: SERVER_HOST, SERVER_USER, SERVER_PORT"
            echo "2. 检查 GitHub Secrets: SERVER_SSH_KEY"
            echo "3. 检查服务器 Docker 和 Docker Compose 是否安装"
            echo "4. 检查 GHCR 镜像是否为公开，或配置 GHCR_TOKEN/GHCR_USER"
            echo "5. 查看上方 SSH 步骤的详细日志（set -x 输出）"
            exit 1
          fi
